<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Watermark Foto Kegiatan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 14px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .canvas-container {
            margin-top: 20px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px dashed #bdc3c7;
            border-radius: 5px;
            background-color: #ecf0f1;
        }
        .btn {
            display: block;
            width: 100%;
            color: white;
            text-align: center;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 10px; /* Added margin between buttons */
        }
        .btn-download {
            background-color: #27ae60;
            margin-top: 20px;
        }
        .btn-download:hover { background-color: #2ecc71; }
        
        .btn-share {
            background-color: #25D366; /* WhatsApp Green */
        }
        .btn-share:hover { background-color: #128C7E; }

        .btn-location {
            background-color: #2980b9;
            margin-bottom: 15px;
        }
        .btn-location:hover { background-color: #3498db; }
        .btn-location:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .section-title {
            grid-column: span 2;
            margin-top: 10px;
            margin-bottom: -5px;
            color: #e67e22;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        
        /* Responsive for mobile */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .form-group.full-width, .section-title { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Aplikasi Watermark Foto</h2>
    
    <div class="form-group full-width">
        <label for="upload">1. Pilih Foto</label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <div class="grid">
        <div class="section-title">Data Manual</div>
        <div class="form-group">
            <label for="kegiatan">Kegiatan</label>
            <input type="text" id="kegiatan" placeholder="Contoh: Rapat Desa / Penyaluran Bansos">
        </div>
        <div class="form-group">
            <label for="waktu">Waktu</label>
            <input type="text" id="waktu" placeholder="Contoh: Senin, 25 Mei 2026 - 10:00 WIB">
        </div>

        <div class="section-title">Data Lokasi (Otomatis GPS)</div>
        <div class="form-group full-width">
            <button class="btn btn-location" id="btn-location" onclick="getLocation()">📍 Ambil Lokasi Otomatis</button>
            <small style="color: #7f8c8d; display: block; text-align: center; margin-top: 5px;">Izinkan akses lokasi pada browser saat diminta.</small>
        </div>

        <div class="form-group">
            <label for="jalan">Jalan</label>
            <input type="text" id="jalan" placeholder="Jalan otomatis terisi">
        </div>
        <div class="form-group">
            <label for="desa">Desa / Kelurahan</label>
            <input type="text" id="desa" placeholder="Desa otomatis terisi">
        </div>
        <div class="form-group">
            <label for="kecamatan">Kecamatan</label>
            <input type="text" id="kecamatan" placeholder="Kecamatan otomatis terisi">
        </div>
        <div class="form-group">
            <label for="kabupaten">Kabupaten / Kota</label>
            <input type="text" id="kabupaten" placeholder="Kabupaten otomatis terisi">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas" width="800" height="400"></canvas>
    </div>

    <button class="btn btn-download" onclick="downloadImage()">⬇️ Download Foto Ber-Watermark</button>
    <button class="btn btn-share" onclick="shareToWhatsApp()">📲 Bagikan ke WhatsApp</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let uploadedImage = null;

    // Daftar ID input form
    const inputIds = ['kegiatan', 'waktu', 'jalan', 'desa', 'kecamatan', 'kabupaten'];

    // Tambahkan event listener agar setiap kali diketik, canvas langsung update
    inputIds.forEach(id => {
        document.getElementById(id).addEventListener('input', drawCanvas);
    });

    // Handle upload foto
    document.getElementById('upload').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedImage = new Image();
            uploadedImage.onload = function() {
                canvas.width = uploadedImage.width;
                canvas.height = uploadedImage.height;
                drawCanvas();
            }
            uploadedImage.src = e.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Fitur Geolocation (Ambil Lokasi Otomatis)
    function getLocation() {
        const btn = document.getElementById('btn-location');
        btn.innerHTML = '⏳ Sedang mencari lokasi...';
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            alert("Fitur lokasi tidak didukung oleh browser ini.");
            resetLocationBtn();
        }
    }

    async function showPosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        try {
            // Menggunakan API Nominatim dari OpenStreetMap (Gratis)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
            const data = await response.json();

            if (data && data.address) {
                const addr = data.address;
                
                // Pemetaan struktur alamat dari OpenStreetMap ke format Indonesia
                document.getElementById('jalan').value = addr.road || addr.pedestrian || '-';
                document.getElementById('desa').value = addr.village || addr.suburb || addr.neighbourhood || addr.hamlet || '-';
                document.getElementById('kecamatan').value = addr.city_district || addr.town || addr.county || '-';
                document.getElementById('kabupaten').value = addr.city || addr.county || addr.state_district || addr.region || '-';

                drawCanvas(); // Update canvas setelah form terisi otomatis
            } else {
                alert("Alamat tidak ditemukan.");
            }
        } catch (error) {
            console.error("Error fetching location:", error);
            alert("Terjadi kesalahan saat mengambil nama alamat. Coba lagi atau isi manual.");
        }
        
        resetLocationBtn();
    }

    function showError(error) {
        let msg = "Terjadi kesalahan yang tidak diketahui.";
        switch(error.code) {
            case error.PERMISSION_DENIED:
                msg = "Anda menolak permintaan akses lokasi. Izinkan di pengaturan browser Anda.";
                break;
            case error.POSITION_UNAVAILABLE:
                msg = "Informasi lokasi tidak tersedia (GPS tidak aktif / sinyal lemah).";
                break;
            case error.TIMEOUT:
                msg = "Waktu permintaan lokasi habis.";
                break;
        }
        alert(msg);
        resetLocationBtn();
    }

    function resetLocationBtn() {
        const btn = document.getElementById('btn-location');
        btn.innerHTML = '📍 Ambil Lokasi Otomatis';
        btn.disabled = false;
    }

    function getLokasiString() {
        const jalan = document.getElementById('jalan').value || '-';
        const desa = document.getElementById('desa').value || '-';
        const kec = document.getElementById('kecamatan').value || '-';
        const kab = document.getElementById('kabupaten').value || '-';
        const bagianLokasi = [jalan, `Ds. ${desa}`, `Kec. ${kec}`, `Kab. ${kab}`].filter(item => !item.includes('-'));
        return bagianLokasi.length > 0 ? bagianLokasi.join(', ') : '-';
    }

    function drawCanvas() {
        if (!uploadedImage) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#7f8c8d';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Preview foto akan muncul di sini', canvas.width / 2, canvas.height / 2);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(uploadedImage, 0, 0);

        const kegiatan = document.getElementById('kegiatan').value || '-';
        const waktu = document.getElementById('waktu').value || '-';
        const lokasi = getLokasiString();

        const fontSize = Math.max(canvas.height / 35, 20); 
        ctx.font = `bold ${fontSize}px Arial`;
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'left';

        const lines = [
            `Waktu    : ${waktu}`,
            `Lokasi    : ${lokasi}`,
            `Kegiatan : ${kegiatan}`
        ];

        const padding = fontSize;
        const lineSpacing = fontSize * 1.5;
        
        // HAPUS Latar Belakang Hitam Transparan
        // ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        // ctx.fillRect(0, canvas.height - boxHeight - padding, canvas.width, boxHeight + padding * 2);

        // Tambahkan efek stroke (garis tepi) hitam agar teks terbaca di latar belakang apapun
        ctx.lineWidth = fontSize / 8;
        ctx.strokeStyle = 'black';

        let startY = canvas.height - padding;
        
        lines.reverse().forEach((line, index) => {
            if (index === lines.length - 1) {
                ctx.fillStyle = '#f1c40f'; // Warna kuning untuk judul kegiatan
            } else {
                ctx.fillStyle = '#ffffff'; // Warna putih untuk lokasi & waktu
            }
            const y = startY - (index * lineSpacing);
            // Gambar garis tepi (stroke) dulu, baru teks isian (fill)
            ctx.strokeText(line, padding, y);
            ctx.fillText(line, padding, y);
        });
    }

    function downloadImage() {
        if (!uploadedImage) {
            alert('Silakan upload foto terlebih dahulu!');
            return;
        }
        const link = document.createElement('a');
        link.download = 'Foto_Kegiatan_Watermark.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        return true; // Mengembalikan nilai true untuk menandakan download berhasil dimulai
    }

    function shareToWhatsApp() {
        if (!uploadedImage) {
            alert('Silakan upload foto dan isi data terlebih dahulu!');
            return;
        }

        // Pastikan pengguna sudah mendownload gambar terlebih dahulu
        const confirmDownload = confirm("PENTING: Gambar harus di-download terlebih dahulu sebelum dibagikan ke WhatsApp. Klik OK untuk download gambar, lalu setelah WhatsApp terbuka, lampirkan gambar yang baru saja Anda download.");
        
        if (confirmDownload) {
            downloadImage(); // Memicu download otomatis

            const kegiatan = document.getElementById('kegiatan').value || '-';
            const waktu = document.getElementById('waktu').value || '-';
            const lokasi = getLokasiString();

            // Buat pesan teks
            let message = `*Laporan Kegiatan*\n\n`;
            message += `*Kegiatan:* ${kegiatan}\n`;
            message += `*Waktu:* ${waktu}\n`;
            message += `*Lokasi:* ${lokasi}\n\n`;
            message += `_(Lampirkan foto kegiatan yang telah di-download)_`;

            // Encode pesan untuk URL
            const encodedMessage = encodeURIComponent(message);
            
            // Buka WhatsApp di tab baru (gunakan timeout agar download sempat berjalan)
            setTimeout(() => {
                window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
            }, 1000);
        }
    }

    drawCanvas();
</script>

</body>
</html>

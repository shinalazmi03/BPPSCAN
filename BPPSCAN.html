<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN JPG to PDF Converter & Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-600 mb-2">📄 LAN PDF Converter & Scanner</h1>
        <p class="text-center text-gray-500 text-sm mb-6">Aplikasi Jaringan Lokal - Konversi Gambar & Scan Kamera ke PDF</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <label class="flex flex-col items-center justify-center p-4 bg-blue-50 rounded-lg border-2 border-dashed border-blue-300 cursor-pointer hover:bg-blue-100 transition">
                <span class="text-3xl mb-1">📁</span>
                <span class="font-semibold text-blue-700 text-sm">Pilih Gambar dari Galeri</span>
                <input type="file" id="fileInput" accept="image/*" multiple class="hidden" onchange="handleFileSelect(event)">
            </label>

            <button onclick="startCamera()" class="flex flex-col items-center justify-center p-4 bg-green-50 rounded-lg border-2 border-dashed border-green-300 cursor-pointer hover:bg-green-100 transition">
                <span class="text-3xl mb-1">📷</span>
                <span class="font-semibold text-green-700 text-sm">Scan Langsung via Kamera</span>
            </button>
        </div>

        <div id="cameraArea" class="hidden bg-gray-900 p-4 rounded-xl mb-6 relative">
            <video id="video" class="w-full rounded-lg bg-black" autoplay playsinline></video>
            <div class="flex justify-center gap-4 mt-4">
                <button onclick="takeSnapshot()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow-md">📷 Ambil Gambar</button>
                <button onclick="stopCamera()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-full shadow-md">Tutup</button>
            </div>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-semibold text-gray-700">Daftar Halaman/Gambar (<span id="imageCount">0</span>):</h3>
                <div class="text-sm bg-gray-200 text-gray-700 px-3 py-1 rounded-lg">
                    No. Urut Berikutnya: <span id="nextOrderNo" class="font-bold text-blue-600">001</span>
                    <button onclick="resetOrderCounter()" class="ml-2 text-xs text-red-500 hover:underline">Reset No</button>
                </div>
            </div>
            <div id="previewContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 p-4 bg-gray-50 rounded-lg min-h-[100px] border border-gray-200">
                </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-between items-center border-t pt-4">
            <button onclick="clearAll()" class="w-full sm:w-auto bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition">Hapus Semua</button>
            <button onclick="generatePDF()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition text-lg">💾 Simpan Jadi PDF</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let imageList = []; // Menyimpan array base64 data gambar

        // Inisialisasi Counter Nomor Urut menggunakan localStorage browser
        if (!localStorage.getItem('pdf_order_counter')) {
            localStorage.setItem('pdf_order_counter', '1');
        }
        updateOrderDisplay();

        function updateOrderDisplay() {
            const currentCounter = parseInt(localStorage.getItem('pdf_order_counter')) || 1;
            document.getElementById('nextOrderNo').innerText = String(currentCounter).padStart(3, '0');
        }

        function resetOrderCounter() {
            if (confirm("Reset nomor urut kembali ke 001?")) {
                localStorage.setItem('pdf_order_counter', '1');
                updateOrderDisplay();
            }
        }

        // 1. Handle File Upload dari Galeri
        function handleFileSelect(event) {
            const files = event.target.files;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    addImage(e.target.result);
                };
                reader.readAsDataURL(files[i]);
            }
            event.target.value = ''; // Reset input file
        }

        // 2. Kamera Fitur (Scan Langsung)
        let stream = null;
        async function startCamera() {
            const cameraArea = document.getElementById('cameraArea');
            const video = document.getElementById('video');
            cameraArea.classList.remove('hidden');
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal mengakses kamera. Pastikan Anda menggunakan koneksi HTTPS atau localhost/LAN yang aman.");
                console.error(err);
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            addImage(dataUrl);
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('cameraArea').classList.add('hidden');
        }

        // 3. Tambah Gambar ke Daftar Preview
        function addImage(base64Data) {
            imageList.push(base64Data);
            updatePreview();
        }

        // 4. Update Tampilan Preview
        function updatePreview() {
            const container = document.getElementById('previewContainer');
            const countSpan = document.getElementById('imageCount');
            container.innerHTML = '';
            countSpan.innerText = imageList.length;

            imageList.forEach((imgData, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative group border rounded p-1 bg-white shadow-sm';

                const img = document.createElement('img');
                img.src = imgData;
                img.className = 'w-full h-32 object-cover rounded';

                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '✕';
                deleteBtn.className = 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow hover:bg-red-600 cursor-pointer';
                deleteBtn.onclick = () => {
                    imageList.splice(index, 1);
                    updatePreview();
                };

                const pageBadge = document.createElement('span');
                pageBadge.innerText = `Hal ${index + 1}`;
                pageBadge.className = 'absolute bottom-1 left-1 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded';

                wrapper.appendChild(img);
                wrapper.appendChild(deleteBtn);
                wrapper.appendChild(pageBadge);
                container.appendChild(wrapper);
            });
        }

        // 5. Hapus Semua Data
        function clearAll() {
            if(confirm("Hapus semua gambar?")) {
                imageList = [];
                updatePreview();
                stopCamera();
            }
        }

        // 6. Generate dan Download PDF dengan Penamaan Otomatis
        function generatePDF() {
            if (imageList.length === 0) {
                alert("Pilih gambar atau scan terlebih dahulu!");
                return;
            }

            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();

            imageList.forEach((imgData, index) => {
                if (index > 0) {
                    pdf.addPage();
                }
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            });

            // ========================================================
            // LOGIKA OTOMATISASI NAMA FILE: BPP_TANGGALDI BUAT_NOURUT
            // ========================================================
            const sekarang = new Date();
            const tahun = sekarang.getFullYear();
            const bulan = String(sekarang.getMonth() + 1).padStart(2, '0');
            const tanggal = String(sekarang.getDate()).padStart(2, '0');
            const formatTanggal = `${tahun}${bulan}${tanggal}`; // Hasil: YYYYMMDD (contoh: 20260603)

            // Ambil nomor urut dari penyimpanan internal browser (localStorage)
            let counterSaatIni = parseInt(localStorage.getItem('pdf_order_counter')) || 1;
            const formatNoUrut = String(counterSaatIni).padStart(3, '0'); // Hasil: 001, 002, dst.

            // Gabungkan menjadi nama file final
            const namaFile = `BPP_${formatTanggal}_${formatNoUrut}.pdf`;
            
            // Simpan/Download PDF ke perangkat
            pdf.save(namaFile);

            // Tambah +1 nomor urut untuk cetakan berikutnya, lalu simpan kembali
            counterSaatIni += 1;
            localStorage.setItem('pdf_order_counter', counterSaatIni);
            updateOrderDisplay(); // Perbarui info tampilan nomor urut di layar
        }
    </script>
</body>
</html>
